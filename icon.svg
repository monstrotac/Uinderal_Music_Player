<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sword 1 (bottom-left to top-right) -->
  <g transform="rotate(-45 32 32)">
    <!-- Blade -->
    <rect x="30" y="2" width="4" height="34" rx="1" fill="#f5f5f5"/>
    <rect x="31" y="2" width="2" height="34" fill="#e0e0e0"/>
    <!-- Blade tip -->
    <polygon points="30,4 34,4 32,0" fill="#f5f5f5"/>
    <!-- Crossguard -->
    <rect x="24" y="35" width="16" height="4" rx="2" fill="#dc2626"/>
    <!-- Grip -->
    <rect x="30.5" y="39" width="3" height="12" rx="1" fill="#2a1215"/>
    <rect x="31" y="40" width="2" height="2" fill="#dc2626" opacity="0.5"/>
    <rect x="31" y="44" width="2" height="2" fill="#dc2626" opacity="0.5"/>
    <rect x="31" y="48" width="2" height="2" fill="#dc2626" opacity="0.5"/>
    <!-- Pommel -->
    <circle cx="32" cy="53" r="3" fill="#dc2626"/>
  </g>
  <!-- Sword 2 (bottom-right to top-left) -->
  <g transform="rotate(45 32 32)">
    <!-- Blade -->
    <rect x="30" y="2" width="4" height="34" rx="1" fill="#f5f5f5"/>
    <rect x="31" y="2" width="2" height="34" fill="#e0e0e0"/>
    <!-- Blade tip -->
    <polygon points="30,4 34,4 32,0" fill="#f5f5f5"/>
    <!-- Crossguard -->
    <rect x="24" y="35" width="16" height="4" rx="2" fill="#dc2626"/>
    <!-- Grip -->
    <rect x="30.5" y="39" width="3" height="12" rx="1" fill="#2a1215"/>
    <rect x="31" y="40" width="2" height="2" fill="#dc2626" opacity="0.5"/>
    <rect x="31" y="44" width="2" height="2" fill="#dc2626" opacity="0.5"/>
    <rect x="31" y="48" width="2" height="2" fill="#dc2626" opacity="0.5"/>
    <!-- Pommel -->
    <circle cx="32" cy="53" r="3" fill="#dc2626"/>
  </g>
  <!-- Shield circle -->
  <circle cx="32" cy="32" r="16" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
  <!-- Play triangle -->
  <polygon points="27,22 27,42 43,32" fill="#dc2626"/>
</svg>
