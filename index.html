<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Track Player</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- HEADER -->
    <header id="app-header">
        <img src="LogoWBackground.jpeg" alt="Logo" class="header-logo" id="header-logo">
        <h1 class="header-title">Dual Track Player</h1>
    </header>

    <!-- FILE LOADING ZONE -->
    <section id="file-loader-section">
        <div class="drop-zone" id="drop-zone-a" data-slot="A">
            <div class="drop-zone-icon">&#9835;</div>
            <div class="drop-zone-label">Instrumental Track</div>
            <div class="drop-zone-hint">Drag & drop or click to browse</div>
            <div class="drop-zone-filename" id="filename-a"></div>
            <input type="file" accept="audio/*,video/*" class="file-input" id="file-input-a">
        </div>
        <div class="drop-zone" id="drop-zone-b" data-slot="B">
            <div class="drop-zone-icon">&#9834;</div>
            <div class="drop-zone-label">Vocals / Lyrics Track</div>
            <div class="drop-zone-hint">Drag & drop or click to browse</div>
            <div class="drop-zone-filename" id="filename-b"></div>
            <input type="file" accept="audio/*,video/*" class="file-input" id="file-input-b">
        </div>
        <div class="startup-config" id="startup-config">
            <button id="btn-load-config-startup" class="btn-config btn-config-load" title="Load a saved configuration">
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 3.5A1.5 1.5 0 012.5 2h3.379a1.5 1.5 0 011.06.44l.622.621a.5.5 0 00.354.146H13.5A1.5 1.5 0 0115 4.707V12.5a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 12.5v-9z" fill="currentColor"/></svg>
                Load Config
            </button>
            <span id="pending-config-display" class="config-name hidden"></span>
        </div>
    </section>

    <!-- VIDEO DISPLAY -->
    <section id="video-section" class="hidden">
        <div id="video-container"></div>
    </section>

    <!-- TOGGLE SWITCH -->
    <section id="toggle-section" class="hidden">
        <button id="track-toggle" class="track-toggle" title="Press T to toggle">
            <span class="toggle-side toggle-side-a active" id="toggle-label-a">INSTRUMENTAL</span>
            <span class="toggle-divider"></span>
            <span class="toggle-side toggle-side-b" id="toggle-label-b">VOCALS</span>
        </button>
    </section>

    <!-- WAVEFORM + TIMELINE + TRIM -->
    <section id="timeline-section" class="hidden">
        <!-- Waveform display -->
        <div class="waveform-area" id="waveform-area">
            <div class="waveform-row" id="waveform-row-a">
                <span class="waveform-label waveform-label-a">Instrumental</span>
                <canvas id="waveform-canvas-a" class="waveform-canvas"></canvas>
            </div>
            <div class="waveform-row" id="waveform-row-b">
                <span class="waveform-label waveform-label-b">Vocals</span>
                <canvas id="waveform-canvas-b" class="waveform-canvas"></canvas>
            </div>
            <div class="waveform-playhead" id="waveform-playhead"></div>
        </div>
        <div class="waveform-toolbar">
            <div class="toolbar-group">
                <button id="btn-zoom-in" class="btn-secondary btn-icon" title="Zoom In (+)">+</button>
                <span id="zoom-level-display" class="zoom-display">1x</span>
                <button id="btn-zoom-out" class="btn-secondary btn-icon" title="Zoom Out (-)" disabled>-</button>
                <button id="btn-zoom-reset" class="btn-secondary" title="Reset Zoom" disabled>Fit</button>
            </div>
            <div class="toolbar-group">
                <button id="btn-auto-sync" class="btn-auto-sync">Auto Sync</button>
                <button id="btn-advanced" class="btn-secondary">Advanced Align</button>
                <span id="offset-display" class="offset-display hidden">Offset: +0ms</span>
                <button id="btn-reset-offset" class="btn-secondary hidden">Reset Offset</button>
            </div>
        </div>

        <div class="time-display">
            <span id="current-time">0:00</span>
            <span class="time-separator">/</span>
            <span id="duration">0:00</span>
        </div>
        <div class="timeline-container" id="timeline">
            <div class="timeline-track" id="timeline-track">
                <div class="timeline-trim-overlay trim-overlay-left" id="trim-overlay-left"></div>
                <div class="timeline-trim-overlay trim-overlay-right" id="trim-overlay-right"></div>
                <div class="timeline-progress" id="timeline-progress"></div>
                <div class="timeline-playhead" id="timeline-playhead"></div>
            </div>
            <div class="trim-marker trim-start" id="trim-start-marker"></div>
            <div class="trim-marker trim-end-marker" id="trim-end-marker"></div>
        </div>
        <div class="trim-controls">
            <label class="trim-label">Start: <input type="text" id="trim-start-input" class="trim-time-input" placeholder="0:00" readonly></label>
            <label class="trim-label">End: <input type="text" id="trim-end-input" class="trim-time-input" placeholder="0:00" readonly></label>
            <button id="trim-reset" class="btn-secondary">Reset Trim</button>
        </div>
    </section>

    <!-- TRANSPORT CONTROLS -->
    <section id="transport-section" class="hidden">
        <div class="transport-controls">
            <button id="btn-stop" class="transport-btn" title="Stop">
                <svg width="20" height="20" viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" rx="2" fill="currentColor"/></svg>
            </button>
            <button id="btn-play" class="transport-btn transport-btn-primary" title="Play / Pause (Space)">
                <svg width="24" height="24" viewBox="0 0 24 24" id="play-icon">
                    <polygon points="6,3 20,12 6,21" fill="currentColor"/>
                </svg>
            </button>
            <button id="btn-loop" class="transport-btn" title="Loop">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <path d="M14 3l3 3-3 3M6 17l-3-3 3-3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M17 6H8a4 4 0 000 8h0M3 14h9a4 4 0 000-8h0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="volume-control">
            <svg class="volume-icon" width="18" height="18" viewBox="0 0 24 24">
                <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor"/>
                <path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
            <input type="range" id="volume-slider" min="0" max="100" value="100" class="volume-slider">
        </div>
    </section>

    <!-- CONFIG SAVE/LOAD -->
    <section id="config-section" class="hidden">
        <div class="config-controls">
            <button id="btn-save-config" class="btn-config btn-config-save" title="Save current settings to a file">
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 1h9l3 3v10a1 1 0 01-1 1H2a1 1 0 01-1-1V2a1 1 0 011-1zm7 0v4H4V1h5zm-2 7a2 2 0 100 4 2 2 0 000-4z" fill="currentColor"/></svg>
                Save Config
            </button>
            <button id="btn-load-config" class="btn-config btn-config-load" title="Load settings from a file">
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 3.5A1.5 1.5 0 012.5 2h3.379a1.5 1.5 0 011.06.44l.622.621a.5.5 0 00.354.146H13.5A1.5 1.5 0 0115 4.707V12.5a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 12.5v-9z" fill="currentColor"/></svg>
                Load Config
            </button>
            <input type="file" accept=".json,.dtp.json" id="config-file-input" class="file-input">
            <span id="config-name-display" class="config-name hidden"></span>
        </div>
    </section>

    <!-- KEYBOARD SHORTCUTS HINT -->
    <footer id="app-footer">
        <div class="shortcuts-hint">
            <span><kbd>Space</kbd> Play/Pause</span>
            <span><kbd>T</kbd> Toggle</span>
            <span><kbd>&larr;</kbd><kbd>&rarr;</kbd> Seek</span>
            <span><kbd>+</kbd><kbd>-</kbd> Zoom</span>
            <span><kbd>0</kbd> Fit</span>
            <span><kbd>M</kbd> Mute</span>
        </div>
    </footer>

    <!-- Hidden media containers -->
    <div id="media-elements" style="display:none;"></div>

    <!-- Scripts in dependency order -->
    <script src="js/audio-engine.js"></script>
    <script src="js/file-loader.js"></script>
    <script src="js/video-manager.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/trim-controller.js"></script>
    <script src="js/waveform.js"></script>
    <script src="js/ui-controls.js"></script>
    <script src="js/config-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
